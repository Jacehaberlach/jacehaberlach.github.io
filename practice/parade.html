<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Animation Parade</title>
<style>
canvas{
	border: 1px Turquoise solid;
}
</style>
	</head>
	<body>
		<h1>My Beautiful Animation Parade!</h1>
		<canvas id="myCanvas"
			width="800"
			height="800">
		</canvas>
			<script>
const canvas = document
.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
let x = 1;
let x2 = 25;
let x3 = 50;
let x4 = 25;
let Vx = 15;
let Vx2 = 15;
let Vx3 = 15;
let Vx4 = 15;
function parade(){
	x = x + Vx;
	x2 = x2 + Vx2;
	x3 = x3 + Vx3;
	x4 = x4 + Vx4;
	if(x > 700 || x < 0){
		Vx = Vx * -1;
	}
	if(x2 > 775 || x2 < 25){
		Vx2 = Vx2 * -1;
	}
	if(x3 > 750 || x3 < 50){
		Vx3 = Vx3 * -1;
	}
	if(x4 > 725 || x4 < 0){
		Vx4 = Vx4 * -1;
	}


ctx.clearRect(0,0,800,800);

//The Green square
ctx.fillStyle = "Green";
ctx.fillRect(x,100,100,100);

//Purple circle
ctx.fillStyle = "Purple";
ctx.beginPath();
ctx.arc(x2,500,25,0,2 * Math.PI);
ctx.stroke();
ctx.fill();

//Blue triangle
ctx.fillStyle = "Blue";
ctx.beginPath();
ctx.moveTo(x3,250);
ctx.lineTo(x3 - 40,300);
ctx.lineTo(x3 + 40,300);
ctx.closePath();
ctx.fill();

//Red octogon
ctx.fillStyle = "Red";
ctx.beginPath();
ctx.moveTo(x4,75);
ctx.lineTo(x4,50);
ctx.lineTo(x4 + 25,25);
ctx.lineTo(x4 + 50,25);
ctx.lineTo(x4 + 75,50);
ctx.lineTo(x4 + 75,75);
ctx.lineTo(x4 + 50,100);
ctx.lineTo(x4 + 25,100);
ctx.closePath();
ctx.fill();

requestAnimationFrame(parade);
}

parade();

			</script>
	</body>
</html>
