<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Animation Parade</title>
<style>
canvas{
	border: 1px Turquoise solid;
}
</style>
	</head>
	<body>
		<h1>My Beautiful Animation Parade!</h1>
		<canvas id="myCanvas"
			width="800"
			height="800">
		</canvas>
			<script>
const canvas = document
.getElementById("myCanvas");
const ctx = canvas.getContext("2d");
let x = 1;
let x2 = 25;
let x3 = 1;
let Vx = 50;
let Vx2 = 50;
let Vx3 = 75;
function parade(){
	x = x + Vx;
	x2 = x2 + Vx2;
	x3 = x3 + Vx3;
	if(x > 775 || x < 0){
		Vx = Vx * -1;
	}
	if(x2 > 775 || x2 < 25){
		Vx2 = Vx2 * -1;
	}
	if(x3 > 800 || x3 < 0){
		Vx3 = Vx3 * -1;
	}

ctx.clearRect(0,0,800,800);
ctx.fillStyle = "Green";
ctx.fillRect(x,100,25,25);
ctx.fillStyle = "Purple";
ctx.beginPath();
ctx.arc(x2,500,25,2 * Math.PI,0);
ctx.stroke();
ctx.moveTo(400,400);
ctx.lineTo(x3,200);
ctx.lineTo(x3,300);
ctx.lineTo(x3,250);
ctx.fillStyle = "Purple";
ctx.fill();
requestAnimationFrame(parade);
}

parade();

			</script>
	</body>
</html>
